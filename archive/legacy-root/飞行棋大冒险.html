<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>飞行棋 · 大冒险 v6.6 基地掷骰任务</title>
    <style>
        :root {
            --bg: #f7f1e8; --ink: #25211d; --muted: #776f65; --panel: #fffdf8ee; --line: #ddd0bf;
            --Y: #ffd84d; --B: #4aa3ff; --R: #ff6666; --G: #55d37d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100svh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 0 0, #fff2a5 0, transparent 360px),
                radial-gradient(circle at 100% 100%, #d7efff 0, transparent 380px), var(--bg);
        }
        button, input, select, textarea { font: inherit; }
        button {
            border: 0; border-radius: 14px; padding: .75rem 1rem; background: #27231f; color: #fff;
            font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px #0002;
        }
        button.secondary { background: #f1eadf; color: #29241f; border: 1px solid var(--line); box-shadow: none; }
        button.warn { background: #b73737; }
        button:disabled { opacity: .5; cursor: not-allowed; }
        input, select, textarea {
            width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: .65rem;
            background: #fff; color: var(--ink);
        }
        textarea { min-height: 60px; resize: vertical; line-height: 1.4; }
        .app { max-width: 1250px; margin: auto; padding: 14px; }
        .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
        .brand { display: flex; gap: 12px; align-items: center; }
        .logo {
            width: 48px; height: 48px; border-radius: 18px; display: grid; place-items: center;
            font-size: 26px; background: conic-gradient(var(--Y), var(--B), var(--R), var(--G), var(--Y));
            border: 4px solid white; box-shadow: 0 12px 30px #0002;
        }
        h1 { margin: 0; font-size: clamp(22px, 4vw, 34px); }
        small, .hint { color: var(--muted); font-size: 13px; }
        .card {
            background: var(--panel); border: 1px solid #e3d7c8; border-radius: 24px;
            padding: 16px; box-shadow: 0 16px 40px #34210c18; backdrop-filter: blur(8px);
        }
        .setup { display: grid; grid-template-columns: minmax(300px, 1fr) minmax(300px, 1fr); gap: 16px; }
        .game { display: none; }
        .game-grid { display: grid; grid-template-columns: minmax(320px, 760px) minmax(310px, 430px); gap: 16px; align-items: start; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .player-row { display: grid; grid-template-columns: 1fr 105px 40px; gap: 8px; margin-bottom: 8px; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: .6rem 0; }
        .chip {
            border-radius: 999px; background: #fff; border: 1px solid var(--line);
            padding: .32rem .6rem; font-size: 13px; font-weight: 900;
        }
        details { border: 1px solid var(--line); border-radius: 18px; background: #fff9; padding: .75rem; margin: 10px 0; }
        summary { cursor: pointer; font-weight: 900; }
        .task-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
        .task-grid label { color: var(--muted); font-size: 12px; font-weight: 900; }

        .board-wrap { width: min(96vw, 760px); max-width: 100%; margin: auto; }
        .board {
            position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px;
            background: #fff7e6; border: 4px solid #2b241d; overflow: hidden;
            box-shadow: inset 0 0 0 8px #ffffffaa, 0 18px 38px #0002;
        }
        .board::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to right, #0000000c 1px, transparent 1px),
                linear-gradient(to bottom, #0000000c 1px, transparent 1px);
            background-size: 5% 5%;
        }
        .base-panel {
            position: absolute; width: 24%; height: 24%; border: 3px solid #2226;
            border-radius: 22px; box-shadow: inset 0 4px 0 #fff7;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 12%; padding: 12%;
        }
        .base-panel.G { left: 2%; top: 2%; background: var(--G); }
        .base-panel.R { right: 2%; top: 2%; background: var(--R); }
        .base-panel.B { left: 2%; bottom: 2%; background: var(--B); }
        .base-panel.Y { right: 2%; bottom: 2%; background: var(--Y); }
        .hole { border-radius: 50%; background: #fffdf8; border: 3px solid #0003; box-shadow: inset 0 4px 10px #0001; }
        .spot {
            position: absolute; width: 4.55%; height: 4.55%; min-width: 20px; min-height: 20px;
            border-radius: 50%; transform: translate(-50%, -50%);
            display: grid; place-items: center; border: 2px solid #2228;
            box-shadow: inset 0 2px 0 #fff8, 0 4px 9px #0002;
            font-size: clamp(8px, 1.35vw, 13px); font-weight: 1000;
            text-align: center; line-height: 1;
        }
        .spot.Y { background: var(--Y); } .spot.B { background: var(--B); } .spot.R { background: var(--R); } .spot.G { background: var(--G); }
        .spot.start { outline: 4px solid #fff; box-shadow: 0 0 0 3px #222, inset 0 2px 0 #fff8, 0 4px 9px #0002; }
        .spot.straight { border-radius: 18px; }
        .center {
            position: absolute; left: 50%; top: 50%; width: 12%; height: 12%;
            transform: translate(-50%, -50%); border-radius: 50%; display: grid; place-items: center;
            background: conic-gradient(var(--R) 0 25%, var(--Y) 0 50%, var(--B) 0 75%, var(--G) 0);
            border: 4px solid #27231f; box-shadow: 0 10px 22px #0003;
        }
        .center span {
            width: 58%; height: 58%; border-radius: 50%; display: grid; place-items: center;
            background: white; color: #d71919; font-size: clamp(20px, 5vw, 42px); font-weight: 1000;
        }
        .piece-layer { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
        .piece {
            position: absolute; width: 8%; height: auto; min-width: 50px; min-height: 34px;
            transform: translate(-50%, -50%);
            display: flex; align-items: center; gap: 4px;
            filter: drop-shadow(0 4px 8px #0005);
            transition: left .28s ease, top .28s ease, transform .2s ease;
            white-space: nowrap;
        }
        .piece-img {
            width: 34px; height: 34px; flex-shrink: 0;
        }
        .piece-name {
            font-size: 11px; font-weight: 900; color: #fff;
            background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 6px; border-radius: 8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.7);
            line-height: 1.2;
        }
        .piece.current {
            filter: drop-shadow(0 4px 8px #0005) drop-shadow(0 0 12px #111);
            animation: pulse .8s infinite alternate;
        }
        @keyframes pulse { to { filter: drop-shadow(0 4px 8px #0005) drop-shadow(0 0 18px #111) brightness(1.15); } }
        .side { display: grid; gap: 12px; }
        .status {
            display: flex; justify-content: space-between; align-items: center; gap: 8px;
            background: #fff9; border: 1px solid var(--line); border-radius: 18px; padding: .75rem;
        }
        .current-name { font-size: 18px; font-weight: 1000; }
        .badge { display: inline-block; border-radius: 999px; background: #eee7dc; padding: .35rem .6rem; font-size: 13px; font-weight: 900; }
        .dice-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; margin-top: 12px; }
        .dice-container {
            width: 106px; height: 106px; perspective: 600px; cursor: pointer;
        }
        .dice-cube {
            width: 60px; height: 60px; position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(15deg);
            margin: auto;
            transition: transform 0.7s ease-out;
        }
        .face {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(145deg, #fff, #e8e0d6);
            border: 2px solid #999;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 6px;
            backface-visibility: hidden;
            box-shadow: inset -4px -4px 8px #0001, inset 4px 4px 8px #fff;
        }
        .pip {
            width: 12px; height: 12px;
            background: #2b241d;
            border-radius: 50%;
            align-self: center;
            justify-self: center;
            box-shadow: inset -1px -1px 2px #0005;
        }
        /* 点数1: 中间 */
        .face-1 .pip { grid-column: 2; grid-row: 2; }
        /* 点数2: 左上和右下 */
        .face-2 .pip:nth-child(1) { grid-column: 1; grid-row: 1; }
        .face-2 .pip:nth-child(2) { grid-column: 3; grid-row: 3; }
        /* 点数3: 对角线 */
        .face-3 .pip:nth-child(1) { grid-column: 1; grid-row: 1; }
        .face-3 .pip:nth-child(2) { grid-column: 2; grid-row: 2; }
        .face-3 .pip:nth-child(3) { grid-column: 3; grid-row: 3; }
        /* 点数4: 四角 */
        .face-4 .pip:nth-child(1) { grid-column: 1; grid-row: 1; }
        .face-4 .pip:nth-child(2) { grid-column: 3; grid-row: 1; }
        .face-4 .pip:nth-child(3) { grid-column: 1; grid-row: 3; }
        .face-4 .pip:nth-child(4) { grid-column: 3; grid-row: 3; }
        /* 点数5: 四角+中间 */
        .face-5 .pip:nth-child(1) { grid-column: 1; grid-row: 1; }
        .face-5 .pip:nth-child(2) { grid-column: 3; grid-row: 1; }
        .face-5 .pip:nth-child(3) { grid-column: 2; grid-row: 2; }
        .face-5 .pip:nth-child(4) { grid-column: 1; grid-row: 3; }
        .face-5 .pip:nth-child(5) { grid-column: 3; grid-row: 3; }
        /* 点数6: 左右两列 */
        .face-6 .pip:nth-child(1) { grid-column: 1; grid-row: 1; }
        .face-6 .pip:nth-child(2) { grid-column: 3; grid-row: 1; }
        .face-6 .pip:nth-child(3) { grid-column: 1; grid-row: 2; }
        .face-6 .pip:nth-child(4) { grid-column: 3; grid-row: 2; }
        .face-6 .pip:nth-child(5) { grid-column: 1; grid-row: 3; }
        .face-6 .pip:nth-child(6) { grid-column: 3; grid-row: 3; }
        /* 3D 面位置 */
        .face.front  { transform: rotateY(0deg) translateZ(30px); }
        .face.back   { transform: rotateY(180deg) translateZ(30px); }
        .face.right  { transform: rotateY(90deg) translateZ(30px); }
        .face.left   { transform: rotateY(-90deg) translateZ(30px); }
        .face.top    { transform: rotateX(90deg) translateZ(30px); }
        .face.bottom { transform: rotateX(-90deg) translateZ(30px); }
        /* 翻滚动画 */
        @keyframes tumble {
            0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            25%  { transform: rotateX(120deg) rotateY(-45deg) rotateZ(200deg); }
            50%  { transform: rotateX(-90deg) rotateY(180deg) rotateZ(-60deg); }
            75%  { transform: rotateX(200deg) rotateY(45deg) rotateZ(-180deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }
        .dice-cube.rolling {
            animation: tumble 0.7s ease-out forwards;
        }
        /* 显示特定点数的类 */
        .dice-cube.show-1 { transform: rotateY(0deg) rotateX(0deg); }
        .dice-cube.show-2 { transform: rotateX(90deg) rotateY(0deg); }
        .dice-cube.show-3 { transform: rotateY(90deg) rotateX(0deg); }
        .dice-cube.show-4 { transform: rotateY(-90deg) rotateX(0deg); }
        .dice-cube.show-5 { transform: rotateX(-90deg) rotateY(0deg); }
        .dice-cube.show-6 { transform: rotateY(180deg) rotateX(0deg); }
        .roll-btn { height: 64px; font-size: 20px; background: linear-gradient(135deg, #27231f, #6653ff); }
        .players { display: grid; gap: 8px; max-height: 330px; overflow: auto; }
        .player-card {
            display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px;
            background: #fff9; border: 1px solid var(--line); border-radius: 16px; padding: .7rem;
        }
        .player-card.current { border-color: #111; box-shadow: 0 0 0 3px #0001; }
        .player-card.done { background: #effff2; }
        .pname { font-weight: 1000; }
        .psub { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .log {
            height: 220px; overflow: auto; background: #171514; color: #fff4e5;
            border-radius: 18px; padding: 12px; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        .log p { margin: .15rem 0; }
        .hot { color: #ffe276; } .good { color: #a6f1b3; } .bad { color: #ffaaa5; } .task { color: #add8ff; }
        .modal-bg {
            position: fixed; inset: 0; display: none; place-items: center;
            background: #0007; z-index: 99; padding: 16px;
        }
        .modal {
            width: min(94vw, 520px); background: #fffdf8; border-radius: 28px;
            padding: 20px; box-shadow: 0 22px 60px #0005;
        }
        .modal h2 { margin: .1rem 0 .4rem; }
        .modal pre {
            white-space: pre-wrap; font: inherit; background: #f7f0e5;
            border: 1px solid var(--line); border-radius: 18px; padding: 14px; line-height: 1.5;
        }
        @media(max-width: 860px) {
            .setup, .game-grid { grid-template-columns: 1fr; }
            .task-grid { grid-template-columns: 1fr; }
            .app { padding: 10px; }
            .card { border-radius: 20px; padding: 12px; }
            .base-panel { border-radius: 16px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top">
        <div class="brand">
            <div class="logo">✈️</div>
            <div>
                <h1>飞行棋 · 大冒险 v6.6</h1>
                <small>基地掷骰任务｜起飞独立｜直道统一｜导入导出</small>
            </div>
        </div>
        <button class="secondary" id="continueBtn">继续上局</button>
    </div>

    <section id="setup" class="setup">
        <div class="card">
            <h2>一、玩家设置</h2>
            <p class="hint">2-16 人；每色最多 4 人。每人一枚棋子。</p>
            <div id="playersBox"></div>
            <div class="chips" id="colorCounts"></div>
            <div class="actions">
                <button class="secondary" id="addPlayerBtn">+ 添加玩家</button>
                <button id="startBtn">开始游戏</button>
            </div>
        </div>

        <div class="card">
            <h2>二、任务表</h2>
            <p class="hint">任务表和游戏进度保存在浏览器。每个棋盘格只触发一次。</p>
            <details>
                <summary>🛫 起飞点任务（首次起飞时触发）</summary>
                <textarea id="takeoffTask" data-task="takeoff" style="margin-top:8px;"></textarea>
            </details>
            <details open>
                <summary>🎲 基地掷骰任务（点数2-5，每人每点数仅一次）</summary>
                <div class="task-grid" id="baseRollTasks"></div>
            </details>
            <details>
                <summary>周围路径 12 格任务（共享）</summary>
                <div class="task-grid" id="outerTasks"></div>
            </details>
            <details>
                <summary>直道任务（6格，所有颜色共用）</summary>
                <div class="task-grid" id="straightTasksMerged"></div>
            </details>
            <details>
                <summary>国王卡 A-K</summary>
                <div class="task-grid" id="kingTasks"></div>
            </details>
            <details>
                <summary>终极惩罚</summary>
                <textarea id="finalPunish"></textarea>
            </details>
            <div class="actions">
                <button class="secondary" id="saveTasksBtn">💾 保存任务表</button>
                <button class="secondary" id="exportTasksBtn">📤 导出为文件</button>
                <button class="secondary" id="importTasksBtn">📥 从文件导入</button>
                <button class="secondary" id="fillDemoBtn">✨ 填充示例</button>
                <button class="warn" id="clearBtn">🗑 清空存档</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
        </div>
    </section>

    <section id="game" class="game">
        <div class="game-grid">
            <div class="card">
                <div class="board-wrap">
                    <div class="board" id="board">
                        <div class="base-panel G"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
                        <div class="base-panel R"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
                        <div class="base-panel B"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
                        <div class="base-panel Y"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
                        <div class="center"><span>终</span></div>
                        <div class="piece-layer" id="pieces"></div>
                    </div>
                </div>
            </div>

            <div class="side">
                <div class="card">
                    <div class="status">
                        <div>
                            <div class="hint">当前玩家</div>
                            <div class="current-name" id="currentName">-</div>
                        </div>
                        <div>
                            <span class="badge" id="roundBadge">第 1 轮</span>
                            <span class="badge" id="lastRoll">最后点数：-</span>
                        </div>
                    </div>
                    <div class="dice-row">
                        <div class="dice-container" id="diceContainer">
                            <div class="dice-cube" id="diceCube">
                                <div class="face front face-1">
                                    <div class="pip"></div>
                                </div>
                                <div class="face back face-6">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                                <div class="face right face-3">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                                <div class="face left face-4">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                                <div class="face top face-2">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                                <div class="face bottom face-5">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                            </div>
                        </div>
                        <button class="roll-btn" id="rollBtn">🎲 掷骰子</button>
                    </div>
                    <div class="actions">
                        <button class="secondary" id="backSetupBtn">返回设置</button>
                        <button class="warn" id="newGameBtn">重开</button>
                    </div>
                </div>

                <div class="card">
                    <h3>玩家进度</h3>
                    <div class="players" id="playersList"></div>
                </div>

                <div class="card">
                    <h3>游戏记录</h3>
                    <div class="log" id="log"></div>
                </div>
            </div>
        </div>
    </section>
</div>

<div class="modal-bg" id="modalBg">
    <div class="modal">
        <small id="modalSub">任务</small>
        <h2 id="modalTitle">任务卡</h2>
        <pre id="modalBody"></pre>
        <button id="modalOk">完成，继续</button>
    </div>
</div>

<script>
(() => {
    const STATE_KEY = "flight_adventure_v66_state";
    const TASK_KEY = "flight_adventure_v66_tasks";

    // ========== 音效系统 (Web Audio API) ==========
    let audioCtx = null;
    let diceRollAudio = null;

    function getAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function playDiceRollSound() {
        try {
            // 使用WAV文件播放真实骰子滚动音效
            if (!diceRollAudio) {
                diceRollAudio = new Audio('./dice_roll.wav');
                diceRollAudio.volume = 0.5;
                diceRollAudio.load(); // 预加载音频
            }
            diceRollAudio.currentTime = 0; // 重置到开始
            diceRollAudio.play().catch(e => console.log('音效播放失败:', e));
        } catch(e) {
            console.log('音效播放失败:', e);
            // 降级到白噪音
            fallbackDiceRollSound();
        }
    }

    // 降级方案：白噪音（当MP3无法播放时使用）
    function fallbackDiceRollSound() {
        try {
            const ctx = getAudioContext();
            const bufferSize = ctx.sampleRate * 0.3;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
            }
            const source = ctx.createBufferSource();
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass'; filter.frequency.value = 800; filter.Q.value = 0.5;
            source.buffer = buffer; source.connect(filter); filter.connect(ctx.destination);
            source.start();
        } catch(e) { console.log('降级音效也失败'); }
    }

    function playDiceResultSound(value) {
        try {
            const ctx = getAudioContext();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            oscillator.connect(gainNode); gainNode.connect(ctx.destination);
            const frequencies = { 1: 261.63, 2: 293.66, 3: 329.63, 4: 349.23, 5: 392.00, 6: 440.00 };
            oscillator.frequency.value = frequencies[value] || 330;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            oscillator.start(ctx.currentTime); oscillator.stop(ctx.currentTime + 0.5);
        } catch(e) { console.log('音效播放失败'); }
    }

    // ========== 3D骰子动画系统 (基于 ludo-dice-roller) ==========
    function animateDiceRoll(callback) {
        const diceCube = document.getElementById('diceCube');
        if (!diceCube) { if (callback) callback(); return; }

        playDiceRollSound();

        // 添加滚动动画类
        diceCube.classList.remove('show-1', 'show-2', 'show-3', 'show-4', 'show-5', 'show-6');
        diceCube.classList.add('rolling');

        const result = Math.floor(Math.random() * 6) + 1;

        setTimeout(() => {
            diceCube.classList.remove('rolling');

            // 移除所有show类
            for (let i = 1; i <= 6; i++) {
                diceCube.classList.remove('show-' + i);
            }

            // 添加结果类
            diceCube.classList.add('show-' + result);

            playDiceResultSound(result);

            if (callback) callback(result);
        }, 700);
    }

    function makeOuterPath() {
        const L = 14, R = 86, T = 14, B = 86;
        const step = (R - L) / 12;
        const p = [];
        for (let i = 0; i <= 12; i++) p.push({ x: L + i * step, y: T });
        for (let i = 1; i <= 12; i++) p.push({ x: R, y: T + i * step });
        for (let i = 1; i <= 12; i++) p.push({ x: R - i * step, y: B });
        for (let i = 1; i <= 11; i++) p.push({ x: L, y: B - i * step });
        return p;
    }

    function makeStraightPath() {
        const R = [], Y = [], B = [], G = [];
        const start = 14, center = 50, gap = (center - start) / 7;
        for (let i = 1; i <= 6; i++) {
            R.push({ x: 50, y: start + i * gap });
            Y.push({ x: 86 - i * gap, y: 50 });
            B.push({ x: 50, y: 86 - i * gap });
            G.push({ x: start + i * gap, y: 50 });
        }
        return { R, Y, B, G };
    }

            const spot = document.createElement("div");
            spot.className = `spot outer ${color} ${startColor ? "start" : ""}`;
            spot.style.left = pos.x + "%";
            spot.style.top = pos.y + "%";

            spot.title = startColor ? `${COLORS[startColor].name}色起飞点` : `外圈第${i+1}格`;
            els.board.appendChild(spot);
        });
        Object.keys(straightPath).forEach(color => {
            straightPath[color].forEach((pos, i) => {
                const spot = document.createElement("div");
                spot.className = `spot straight ${color}`;
                spot.style.left = pos.x + "%";
                spot.style.top = pos.y + "%";
                spot.textContent = i + 1;
                spot.title = `直道第 ${i + 1} 格（通用）`;
                els.board.appendChild(spot);
            });
        });
    }

    function saveTasksFromEditors() {
        tasks.takeoff = els.takeoffTask.value.trim() || defaultTasks.takeoff;

            const parts = node.dataset.task.split("-");

            if (parts[0] === "straight") tasks.straight[+parts[1]] = node.value;
            if (parts[0] === "baseRoll") {
                tasks.baseRoll[parts[1]] = node.value;
            }
        });

    function startGame() {
        saveTasksFromEditors();
        if (setupPlayers.length < 2 || setupPlayers.length > 16) return alert("人数必须是 2-16。");
        if (setupPlayers.some(p => !p.name.trim())) return alert("请填写所有玩家名。");
        const counts = countColors(setupPlayers);
        if (Object.values(counts).some(n => n > 4)) return alert("每色最多 4 人。");

        const used = { R:0, Y:0, B:0, G:0 };
        state = {
            players: setupPlayers.map(p => {
                const slot = used[p.color]++;
                return { id: makeId(), name: p.name.trim(), color: p.color, colorSlot: slot, status: "base", outerIndex: null, outerSteps: 0, straightIndex: 0, finishPlace: null };
            }),
            currentIndex: 0, lastRoll: null, round: 1, acted: {}, finishOrder: [], triggered: {}, log: [], gameOver: false
        };
        addLog("游戏开始！掷出 6 才能起飞。", "good", false);
        saveState();
        showGame();
    }

    function continueGame() {
        try {
            const saved = JSON.parse(localStorage.getItem(STATE_KEY));
            if (!saved) return alert("没有存档。");

    function showGame() { els.setup.style.display = "none"; els.game.style.display = "block"; renderAll(); }

    function rollDice() {
        if (!state || rolling || modalOpen || state.gameOver) return;
        const p = currentPlayer();
        if (!p) return;
        rolling = true; els.rollBtn.disabled = true;

        animateDiceRoll((value) => {
            state.lastRoll = value;
            addLog(`${label(p)} 掷出 ${value}。`, "hot");
            if (value === 1) drawKing(p, "掷出1点");

            if (p.status === "base") {
                if (value === 6) {
                    takeOff(p);
                    addLog(`${label(p)} 起飞后获得一次额外投掷。`, "good");
                } else if (value >= 2 && value <= 5) {
                    // 触发基地掷骰任务（每人每点数只触发一次）
                    const key = `baseRoll-${p.id}-${value}`;
                    if (!state.triggered[key]) {
                        state.triggered[key] = true;
                        const taskText = tasks.baseRoll[value] || `掷出${value}点任务`;
                        addLog(`${label(p)} 触发基地掷骰任务（点数${value}）。`, "task");
                        enqueueModal(`🎲 基地任务 ${value}点`, taskText, `${label(p)} 还在基地`);
                    } else {
                        addLog(`${label(p)} 掷出${value}点，该点数任务已完成。`);
                    }
                    endTurn(p);
                } else {
                    endTurn(p);
                }
            } else if (p.status === "outer") {
                moveOuter(p, value);
                if (value !== 6 || p.status === "finished") endTurn(p);
                else addLog(`${label(p)} 掷出6，额外投掷。`, "good");
            } else if (p.status === "straight") {
                moveStraight(p, value);
                if (value !== 6 || p.status === "finished") endTurn(p);
                else addLog(`${label(p)} 掷出6，额外投掷。`, "good");
            }
            rolling = false; renderAll(); saveState();
        });
    }

    function takeOff(p) {
        p.status = "outer"; p.outerSteps = 0; p.outerIndex = START_INDEX[p.color]; p.straightIndex = 0;
        addLog(`${label(p)} 起飞进入起飞点。`, "good");
        const key = `outer-${p.outerIndex}`;
        if (!state.triggered[key]) {
            state.triggered[key] = true;
            addLog(`${label(p)} 触发起飞点任务。`, "task");
            enqueueModal("🛫 起飞点任务", tasks.takeoff || "起飞任务未设置", `${label(p)} 起飞`);
        } else {
            addLog("起飞点任务已触发过。", "task");
        }
    }

    function moveOuter(p, steps) {
        const before = p.outerSteps;
        p.outerSteps += steps;
        if (p.outerSteps >= 48) {
            const remain = p.outerSteps - 48;
            p.status = "straight"; p.outerIndex = null; p.straightIndex = 0;
            addLog(`${label(p)} 走完外圈，进入直道。`, "good");
            if (remain > 0) moveStraight(p, remain, true);
            return;
        }
        p.outerIndex = (START_INDEX[p.color] + p.outerSteps) % 48;
        addLog(`${label(p)} 落在外圈第 ${p.outerIndex+1} 格。`);
        triggerOuterTask(p, p.outerIndex);
    }

    function moveStraight(p, steps, fromOuter = false) {
        const need = 6 - p.straightIndex;
        if (steps >= need) {
            if (need > 0) triggerStraightTask(p, 6);
            finishPlayer(p);
            return;
        }
        p.straightIndex += steps;
        if (fromOuter) addLog(`${label(p)} 进入直道第 ${p.straightIndex} 格。`, "good");
        else addLog(`${label(p)} 直道前进到第 ${p.straightIndex} 格。`);
        triggerStraightTask(p, p.straightIndex);
    }

    function finishPlayer(p) {
        p.status = "finished"; p.finishPlace = state.finishOrder.length + 1; state.finishOrder.push(p.id);
        addLog(`${label(p)} 到达终点！第 ${p.finishPlace} 名。`, "good");
        enqueueModal("🎉 到达终点", `${label(p)} 到达中心终点！`, "终点");
        if (state.finishOrder.length === state.players.length) {
            state.gameOver = true;
            addLog("游戏结束！", "bad");
            enqueueModal("🏁 游戏结束", `最后一名：${label(p)}\n终极惩罚：\n${tasks.final}`, "终极惩罚");
        }
    }

    function endTurn(p) {
        state.acted[p.id] = true;
        if (state.gameOver) return;
        if (isRoundComplete()) roundEnd();
        const next = findNextPlayable((state.players.indexOf(p) + 1) % state.players.length);
        if (next >= 0) state.currentIndex = next;
    }

    function isRoundComplete() { return state.players.filter(p => p.status !== "finished").every(p => state.acted[p.id]); }
    function roundEnd() {
        if (state.finishOrder.length > 0) {
            state.players.filter(p => p.status === "finished").forEach(p => drawKing(p, "每轮结束"));
        }
        state.round++; state.acted = {};
    }

    function findNextPlayable(start) {
        const n = state.players.length;
        for (let i = 0; i < n; i++) { const idx = (start + i) % n; if (state.players[idx].status !== "finished" && !state.acted[state.players[idx].id]) return idx; }
        for (let i = 0; i < n; i++) { if (state.players[(start + i) % n].status !== "finished") return (start + i) % n; }
        return -1;
    }

    function triggerOuterTask(p, index) {
        const key = `outer-${index}`;
        if (state.triggered[key]) return;
        state.triggered[key] = true;
        const taskIndex = index % 12;
        enqueueModal("📍 外圈任务", tasks.outer[taskIndex], `${label(p)} · 外圈第${index+1}格`);
    }

    function triggerStraightTask(p, index) {
        if (index < 1 || index > 6) return;
        const key = `straight-${index}`;
        if (state.triggered[key]) return;
        state.triggered[key] = true;
        enqueueModal("➡️ 直道任务", tasks.straight[index-1], `${label(p)} · 直道第${index}格`);
    }

    function drawKing(p, reason) {
        const i = Math.floor(Math.random() * 13);
        enqueueModal(`👑 国王卡 ${RANKS[i]}`, tasks.king[i], `${label(p)} · ${reason}`);
    }

    function enqueueModal(title, body, sub) {
        modalQueue.push({ title, body, sub });
        if (!modalOpen) showNextModal();
    }

    function showNextModal() {
        if (modalQueue.length === 0) { modalOpen = false; renderAll(); return; }
        const m = modalQueue.shift();
        modalOpen = true;
        els.modalTitle.textContent = m.title; els.modalSub.textContent = m.sub || ""; els.modalBody.textContent = m.body || ""; els.modalBg.style.display = "grid";
    }

    function renderAll() {
        if (!state) return;
        const p = currentPlayer();
        els.currentName.textContent = state.gameOver ? "游戏结束" : (p ? label(p) : "-");
        els.roundBadge.textContent = `第 ${state.round} 轮`;
        els.lastRoll.textContent = `最后点数：${state.lastRoll || "-"}`;

        // 使用 show-X 类显示骰子点数
        if (state.lastRoll) {
            const diceCube = document.getElementById('diceCube');
            if (diceCube) {
                for (let i = 1; i <= 6; i++) {
                    diceCube.classList.remove('show-' + i);
                }
                diceCube.classList.add('show-' + state.lastRoll);
            }
        }

        els.rollBtn.disabled = rolling || modalOpen || state.gameOver;
        renderPieces(); renderPlayersList(); renderLog();
    }

    function renderPieces() {
        els.pieces.innerHTML = "";
        const groups = new Map();
        state.players.forEach(p => {
            const pos = pieceCoord(p);
            const key = `${Math.round(pos.x*10)},${Math.round(pos.y*10)}`;
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push({ p, pos });
        });
        groups.forEach(group => {
            group.forEach((item, i) => {
                const piece = document.createElement("div");
                piece.className = `piece ${currentPlayer()?.id === item.p.id ? "current" : ""}`;
                piece.style.color = `var(--${item.p.color})`;
                piece.style.left = item.pos.x + "%";
                piece.style.top = item.pos.y + "%";
                const off = overlapOffset(i, group.length);
                piece.style.transform = `translate(-50%,-50%) translate(${off.x}px,${off.y}px)`;
                piece.innerHTML = airplaneSVG(item.p);
                els.pieces.appendChild(piece);
            });
        });
    }

    function pieceCoord(p) {
        if (p.status === "base") return baseSlots[p.color][p.colorSlot] || baseSlots[p.color][0];
        if (p.status === "outer") return outerPath[p.outerIndex];
        if (p.status === "straight") return p.straightIndex <= 0 ? outerPath[START_INDEX[p.color]] : straightPath[p.color][Math.min(5, p.straightIndex - 1)];
        const finished = state.players.filter(x => x.status === "finished");
        const idx = Math.max(0, finished.findIndex(x => x.id === p.id));
        return [{x:47,y:47},{x:53,y:47},{x:47,y:53},{x:53,y:53},{x:50,y:50}][idx % 5];
    }

    function overlapOffset(i, n) { if (n<=1) return {x:0,y:0}; const angle = Math.PI*2*i/n; return {x:Math.cos(angle)*10, y:Math.sin(angle)*10}; }

    function renderPlayersList() {
        const cur = currentPlayer();
        els.playersList.innerHTML = state.players.map(p => `
            <div class="player-card ${cur?.id === p.id ? "current" : ""} ${p.status==="finished"?"done":""}">
                <div><div class="pname">${COLORS[p.color].emoji} ${escapeHtml(p.name)} ${p.finishPlace?`<span class="badge">第${p.finishPlace}名</span>`:""}</div><div class="psub">${statusText(p)}</div></div>
                <b>${progressText(p)}</b>
            </div>`).join("");
    }

    function renderLog() {
        els.log.innerHTML = (state.log || []).map(x => `<p class="${x.type||''}">${escapeHtml(x.text)}</p>`).join("");
        els.log.scrollTop = els.log.scrollHeight;
    }

    function addLog(text, type="", persist=true) { if(!state) return; state.log.push({text,type,at:Date.now()}); if(state.log.length>180) state.log = state.log.slice(-180); if(persist) saveState(); }

    function currentPlayer() {
        if (!state) return null;
        const p = state.players[state.currentIndex];
        if (p && p.status !== "finished" && !state.acted[p.id]) return p;
        const idx = findNextPlayable(state.currentIndex || 0);
        if (idx >= 0) { state.currentIndex = idx; return state.players[idx]; }
        return state.players.find(x => x.status !== "finished") || null;
    }

    function statusText(p) {
        if (p.status === "base") return "在基地：需要6起飞。";
        if (p.status === "outer") return `外圈：已走 ${p.outerSteps}/48 步。`;
        if (p.status === "straight") return `直道：第 ${p.straightIndex}/6 格。`;
        return "已到达终点。";
    }

    function progressText(p) { if (p.status==="base") return "基地"; if (p.status==="outer") return `外 ${p.outerSteps}/48`; if (p.status==="straight") return `直 ${p.straightIndex}/6`; return "终点"; }
    function label(p) { return `${COLORS[p.color].emoji}${p.name}`; }
    function countColors(arr) { const counts = {R:0,Y:0,B:0,G:0}; arr.forEach(p => counts[p.color]++); return counts; }

    function loadTasks() {
        try {
            const raw = JSON.parse(localStorage.getItem(TASK_KEY));
            if (!raw) return JSON.parse(JSON.stringify(defaultTasks));
            if (!Array.isArray(raw.straight)) raw.straight = defaultTasks.straight;
            if (!raw.takeoff) raw.takeoff = defaultTasks.takeoff;
            if (!raw.baseRoll) raw.baseRoll = defaultTasks.baseRoll;
            return raw;
        } catch { return JSON.parse(JSON.stringify(defaultTasks)); }
    }

    function saveTasks() { localStorage.setItem(TASK_KEY, JSON.stringify(tasks)); }
    function saveState() { if (state) { localStorage.setItem(STATE_KEY, JSON.stringify(state)); els.continueBtn.disabled = false; } }
    function makeId() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }
    function firstChar(s) { return Array.from((s||"?").trim())[0] || "?"; }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }

    function airplaneSVG(p) {
        const colorMap = { R: 'R', Y: 'Y', B: 'B', G: 'G' };
        const planeColor = colorMap[p.color] || 'R';
        const displayName = escapeHtml(p.name.length > 4 ? p.name.substring(0, 4) : p.name);
        return `
            <img class="piece-img" src="./plane_${planeColor}.png" alt="${COLORS[p.color].name}飞机" />
            <span class="piece-name">${displayName}</span>
        `;
    }
})();
</script>
</body>
</html>
